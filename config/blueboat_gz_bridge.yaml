- ros_topic_name: /blueboat/odom   # <--- ROS side name
  gz_topic_name: /model/blueboat/odometry # <--- Gazebo side name (OdometryPublisher default)
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: "GZ_TO_ROS"

- ros_topic_name: /blueboat/thrusters/left/thrust
  gz_topic_name: /blueboat/thrusters/left/thrust
  ros_type_name: std_msgs/msg/Float64
  gz_type_name: gz.msgs.Double
  direction: "ROS_TO_GZ"

- ros_topic_name: /blueboat/thrusters/right/thrust
  gz_topic_name: /blueboat/thrusters/right/thrust
  ros_type_name: std_msgs/msg/Float64
  gz_type_name: gz.msgs.Double
  direction: "ROS_TO_GZ"
